<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register New Property - Step-by-Step</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #2e7d32; }
    .step { display: none; }
    .step.active { display: block; }
    .progress .progress-bar { background: var(--primary); }
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4>Register New Property (UC004)</h4>
        </div>
        <div class="card-body">
          <!-- Progress Bar -->
          <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar" style="width: 14%;"></div>
          </div>
          <div class="text-center mb-4"><strong>Step <span id="currentStep">1</span> of 7</strong></div>

          <!-- Step 1 -->
          <div class="step active" id="step1">
            <h5>1. Property Type & Location</h5>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label>Property Type *</label>
                <select class="form-select" required>
                  <option>Residential Plot</option>
                  <option>Commercial Plot</option>
                  <option>Agricultural Land</option>
                  <option>House/Flat</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label>District *</label>
                <select class="form-select" id="district"><option>Lahore</option></select>
              </div>
              <div class="col-md-6 mb-3">
                <label>Tehsil *</label>
                <select class="form-select"><option>Cantt</option></select>
              </div>
              <div class="col-md-6 mb-3">
                <label>Mauza *</label>
                <input type="text" class="form-control" placeholder="e.g. Gulberg" required>
              </div>
            </div>
            <button class="btn btn-success float-end" onclick="nextStep(2)">Next</button>
          </div>

          <!-- Step 2 – Patwari Details + Multiple Khasra -->
          <div class="step" id="step2">
            <h5>2. Patwari Details & Khasra Areas</h5>
            <div class="row mb-3">
              <div class="col-md-4"><input type="text" class="form-control" placeholder="Khewat *" required></div>
              <div class="col-md-4"><input type="text" class="form-control" placeholder="Khatooni *" required></div>
            </div>
            <table class="table" id="khasraTable">
              <thead><tr><th>Khasra #</th><th>Area (Marla)</th><th></th></tr></thead>
              <tbody>
                <tr>
                  <td><input type="text" class="form-control" placeholder="112/1"></td>
                  <td><input type="number" class="form-control area-input" placeholder="5" onchange="calcTotal()"></td>
                  <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove(); calcTotal()">X</button></td>
                </tr>
              </tbody>
            </table>
            <button class="btn btn-outline-primary btn-sm" onclick="addKhasra()">+ Add Khasra</button>
            <p class="mt-3"><strong>Total Area: <span id="totalArea">0</span> Marla | <span id="kanal">0</span> Kanal</strong></p>
            <button class="btn btn-secondary me-2" onclick="prevStep(1)">Back</button>
            <button class="btn btn-success float-end" onclick="nextStep(3)">Next</button>
          </div>

          <!-- Steps 3–7 (Ownership, Uploads, Review, Submit, Status) -->
          <!-- ... (I can expand these instantly if you want the full 7 steps now) ... -->

          <div class="step" id="step7">
            <h5>7. Registration Complete!</h5>
            <div class="alert alert-success text-center">
              <h4>Property Registered Successfully!</h4>
              <p>Property ID: <strong>PK-PB-LHR-2025-001234</strong></p>
              <a href="property_details.html?id=PK-PB-LHR-2025-001234" class="btn btn-success">View Property</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let current = 1;
function nextStep(n) { document.getElementById('step'+current).classList.remove('active'); current=n; document.getElementById('step'+n).classList.add('active'); updateProgress(); }
function prevStep(n) { nextStep(n); }
function updateProgress() { document.querySelector('.progress-bar').style.width = (current*14.28)+'%'; document.getElementById('currentStep').textContent = current; }
function addKhasra() { 
  const row = `<tr><td><input type="text" class="form-control"></td><td><input type="number" class="form-control area-input" onchange="calcTotal()"></td><td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove(); calcTotal()">X</button></td></tr>`;
  document.querySelector('#khasraTable tbody').insertAdjacentHTML('beforeend', row);
}
function calcTotal() {
  let total = 0;
  document.querySelectorAll('.area-input').forEach(i => total += parseFloat(i.value)||0);
  document.getElementById('totalArea').textContent = total;
  document.getElementById('kanal').textContent = (total/20).toFixed(2);
}
</script>
</body>
</html>
