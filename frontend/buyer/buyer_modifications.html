<script>
/**
 * Open negotiation page
 */
function openNegotiation(channelId) {
    if (!channelId) {
        alert('Channel not found');
        return;
    }
    
    // Open negotiation page in same window
    window.location.href = `transfer_negotiation.html?channelId=${channelId}`;
    
    // OR open in new tab:
    // window.open(`transfer_negotiation.html?channelId=${channelId}`, '_blank');
}

/**
 * Fetch user's transfers with channel info
 * MODIFY YOUR EXISTING loadTransfers() FUNCTION
 */
async function loadTransfers() {
    try {
        const userId = getUserId(); // Your existing function
        const token = getToken(); // Your existing function
        
        // Fetch transfers
        const response = await fetch(`/api/transfers/buyer/${userId}`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error);
        }
        
        const tbody = document.querySelector('#transfersTable tbody');
        tbody.innerHTML = '';
        
        data.transfers.forEach(transfer => {
            const row = document.createElement('tr');
            
            // Determine channel status display
            let channelStatusHtml = '';
            if (transfer.channel_id) {
                const statusEmoji = {
                    'INACTIVE': '⚪',
                    'ACTIVE': '🟢',
                    'NEGOTIATING': '🟡',
                    'AGREED': '✅',
                    'CLOSED': '⚫'
                };
                
                channelStatusHtml = `
                    <span class="channel-status-badge" data-status="${transfer.channel_status}">
                        ${statusEmoji[transfer.channel_status] || '⚪'} ${transfer.channel_status}
                    </span>
                `;
                
                // Show unread count if available
                if (transfer.unread_count > 0) {
                    channelStatusHtml += `
                        <span class="unread-badge" data-count="${transfer.unread_count}">
                            ${transfer.unread_count} new
                        </span>
                    `;
                }
            } else {
                channelStatusHtml = '<span class="text-muted">No channel</span>';
            }
            
            row.innerHTML = `
                <td>${transfer.transfer_id}</td>
                <td>${transfer.property_id}</td>
                <td>${transfer.seller_name || 'Unknown'}</td>
                <td><span class="status-badge status-${transfer.status.toLowerCase()}">${transfer.status}</span></td>
                <td>${formatDate(transfer.created_at)}</td>
                <td class="negotiation-cell">${channelStatusHtml}</td>
                <td class="actions-cell">
                    <button class="btn-view" onclick="viewTransfer('${transfer.transfer_id}')">View</button>
                    ${transfer.channel_id && transfer.channel_status !== 'CLOSED' ? 
                        `<button class="btn-chat" onclick="openNegotiation('${transfer.channel_id}')">💬 Open Chat</button>` : 
                        ''}
                </td>
            `;
            
            tbody.appendChild(row);
        });
        
    } catch (error) {
        console.error('Error loading transfers:', error);
        alert('Failed to load transfers');
    }
}

/**
 * Helper: Format date
 */
function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

// Call loadTransfers on page load
document.addEventListener('DOMContentLoaded', () => {
    loadTransfers();
    
    // Optional: Refresh every 30 seconds to show new messages
    setInterval(loadTransfers, 30000);
});
</script>

     INTEGRATION NOTES
     ======================================== -->

<!--
1. The above code assumes your transfer object from the API includes:
   - channel_id
   - channel_status
   - unread_count (optional)

2. You'll need to modify your backend transfer endpoint to join with
   transfer_requests table and include channel information:
   
   SELECT 
     t.*,
     tr.channel_id,
     tr.channel_status,
     COUNT(cm.message_id) FILTER (WHERE cm.read_by_other = false AND cm.sender_id != $1) as unread_count
   FROM transfers t
   LEFT JOIN transfer_requests tr ON t.transfer_id = tr.transfer_id
   LEFT JOIN channel_messages cm ON tr.channel_id = cm.channel_id
   WHERE t.buyer_id = $1
   GROUP BY t.transfer_id, tr.channel_id, tr.channel_status

3. Make sure to create the channel when a new transfer is created.
   In your transfer creation endpoint, add:
   
   const channelResult = await channelService.createChannel(
     transferId, 
     sellerId, 
     buyerId
   );
-->
