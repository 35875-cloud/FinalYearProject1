<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freeze / Unfreeze Property</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --p: #2e7d32; --pd: #1b5e20; }
    body { background: #f0f7f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(135deg, #000, var(--pd)); }
    .freeze-card { border-left: 6px solid #d32f2f; }
    .unfreeze-card { border-left: 6px solid var(--p); }
  </style>
</head>
<body>
<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="officer_dashboard.html">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
  </div>
</nav>
<div class="container py-5">
  <h2 class="text-center text-danger mb-5">Freeze / Unfreeze Property (Court Orders)</h2>

  <!-- Search Bar -->
  <div class="row mb-4">
    <div class="col-md-8 mx-auto">
      <div class="input-group input-group-lg">
        <input type="text" class="form-control" placeholder="Search by Property ID or CNIC">
        <button class="btn btn-primary" type="button"><i class="fas fa-search"></i> Search</button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8 mx-auto">
      <div class="card shadow">
        <div class="card-body p-4">
          <div class="row g-3">
            <div class="col-md-6"><input type="text" class="form-control form-control-lg" placeholder="Property ID"></div>
            <div class="col-md-6"><input type="text" class="form-control form-control-lg" placeholder="CNIC of Owner"></div>
            <div class="col-12"><input type="file" class="form-control form-control-lg" accept=".pdf"></div>
            <div class="col-12"><textarea class="form-control" rows="3" placeholder="Court Order Reference / Reason"></textarea></div>
          </div>
          <div class="text-center mt-4">
            <button class="btn btn-danger btn-lg px-5 me-3" onclick="freezeProperty()">FREEZE PROPERTY</button>
            <button class="btn btn-success btn-lg px-5" onclick="unfreezeProperty()">UNFREEZE PROPERTY</button>
          </div>
        </div>
      </div>
      <div class="mt-5">
        <h4>Recent Freeze Requests</h4>
        <div class="card freeze-card mb-3">
          <div class="card-body">
            <strong>PK-PB-LHR-2025-001234</strong> – Frozen on 18 Nov 2025<br>
            Court Order: LHC Case #245/2025 – Inheritance Dispute
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function freezeProperty() {
  if (confirm("This will freeze the property and log to blockchain/audit.\nProceed?")) {
    alert("SUCCESS!\nProperty Frozen\nLogged to Audit Log");
  }
}
function unfreezeProperty() {
  if (confirm("This will unfreeze the property and log to blockchain/audit.\nProceed?")) {
    alert("SUCCESS!\nProperty Unfrozen\nLogged to Audit Log");
  }
}
</script>
</body>
</html>
