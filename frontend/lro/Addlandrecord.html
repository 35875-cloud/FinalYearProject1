<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Land Record - Land Record Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-dark: #27ae60;
            --secondary-blue: #3498db;
            --danger-red: #e74c3c;
            --bg-light: #ecf0f1;
            --text-dark: #2c3e50;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .page-header h1 {
            color: var(--primary-green);
            font-weight: bold;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-section-title {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            margin-top: 20px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section-title:first-child {
            margin-top: 0;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.2rem rgba(46, 204, 113, 0.25);
        }

        .image-preview {
            width: 100%;
            min-height: 200px;
            border: 3px dashed #e0e0e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f8f9fa;
            overflow: hidden;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
        }

        .remove-image {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger-red);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .image-preview.has-image .remove-image {
            display: flex;
        }

        .remove-image:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-secondary {
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
        }

        .text-danger {
            color: var(--danger-red) !important;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .alert {
            border-radius: 10px;
            display: none;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 20px;
            }
            
            .page-header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-plus-circle"></i>
                Add New Land Record
            </h1>
            <p class="text-muted mb-0 mt-2">Please fill in all required fields marked with <span class="text-danger">*</span></p>
        </div>

        <!-- Form Container -->
        <div class="form-container">
            <!-- Success/Error Alert -->
            <div class="alert alert-success" id="successAlert" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successMessage"></span>
            </div>
            <div class="alert alert-danger" id="errorAlert" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <form id="addRecordForm">
                
                <!-- Personal Information -->
                <div class="form-section-title">
                    <i class="fas fa-user"></i>
                    Personal Information
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Owner Name (نام مالک) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="ownerName" placeholder="Enter owner's full name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Father/Husband Name (نام باپ/شوہر) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fatherName" placeholder="Enter father's/husband's name" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Upload Owner Photo</label>
                        <input type="file" class="form-control" id="ownerPhoto" accept="image/*">
                        <div class="image-preview mt-2" id="ownerPhotoPreview">
                            <i class="fas fa-user fa-3x text-muted"></i>
                            <button type="button" class="remove-image" onclick="removeImage('ownerPhoto')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Property Information -->
                <div class="form-section-title">
                    <i class="fas fa-file-alt"></i>
                    Land Record Details
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label">Khata No (کھاتہ نمبر) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="khataNo" placeholder="e.g., 45/900" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Khatooni No (خاطونی نمبر) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="khatooniNo" placeholder="Enter Khatooni number" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Khasra No (خسرہ نمبر) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="khasraNo" placeholder="Enter Khasra number" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Year (سال) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="year" placeholder="e.g., 1988-89" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Murabba No (مربع نمبر)</label>
                        <input type="text" class="form-control" id="murabbaNo" placeholder="Enter Murabba number">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Area (رقبہ) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="area" placeholder="e.g., 5-8-9 (Kanal-Marla-Sarsahi)" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Land Use (استعمال) <span class="text-danger">*</span></label>
                        <select class="form-select" id="landUse" required>
                            <option value="">-- Select --</option>
                            <option value="irrigated">Irrigated (آبی)</option>
                            <option value="non-irrigated">Non-Irrigated (بارانی)</option>
                            <option value="residential">Residential</option>
                            <option value="commercial">Commercial</option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Upload Property/Land Image</label>
                        <input type="file" class="form-control" id="propertyPhoto" accept="image/*">
                        <div class="image-preview mt-2" id="propertyPhotoPreview">
                            <i class="fas fa-home fa-3x text-muted"></i>
                            <button type="button" class="remove-image" onclick="removeImage('propertyPhoto')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Location Information -->
                <div class="form-section-title">
                    <i class="fas fa-map-marker-alt"></i>
                    Location Information
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Tehsil (تحصیل) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="tehsil" placeholder="e.g., Chichawatni" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">District (ضلع) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="district" placeholder="e.g., Sahiwal" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mauza (موضع) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="mauza" placeholder="Enter Mauza name" required>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fas fa-redo me-2"></i>Reset Form
                    </button>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-check me-2"></i>Submit Record
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Image Preview Function
        function setupImagePreview(inputId, previewId) {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.innerHTML = `
                            <img src="${e.target.result}" alt="Preview">
                            <button type="button" class="remove-image" onclick="removeImage('${inputId}')">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                        preview.classList.add('has-image');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // Remove Image Function
        function removeImage(inputId) {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(inputId + 'Preview');
            
            input.value = '';
            
            if (inputId === 'ownerPhoto') {
                preview.innerHTML = `
                    <i class="fas fa-user fa-3x text-muted"></i>
                    <button type="button" class="remove-image" onclick="removeImage('ownerPhoto')">
                        <i class="fas fa-times"></i>
                    </button>
                `;
            } else {
                preview.innerHTML = `
                    <i class="fas fa-home fa-3x text-muted"></i>
                    <button type="button" class="remove-image" onclick="removeImage('propertyPhoto')">
                        <i class="fas fa-times"></i>
                    </button>
                `;
            }
            preview.classList.remove('has-image');
        }

        // Setup image previews
        setupImagePreview('ownerPhoto', 'ownerPhotoPreview');
        setupImagePreview('propertyPhoto', 'propertyPhotoPreview');

        // Form Submission
        document.getElementById('addRecordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate required fields
            if (!this.checkValidity()) {
                this.classList.add('was-validated');
                showAlert('error', 'Please fill in all required fields!');
                return;
            }

            // Collect form data
            const formData = {
                ownerName: document.getElementById('ownerName').value,
                fatherName: document.getElementById('fatherName').value,
                khataNo: document.getElementById('khataNo').value,
                khatooniNo: document.getElementById('khatooniNo').value,
                khasraNo: document.getElementById('khasraNo').value,
                year: document.getElementById('year').value,
                murabbaNo: document.getElementById('murabbaNo').value,
                area: document.getElementById('area').value,
                landUse: document.getElementById('landUse').value,
                tehsil: document.getElementById('tehsil').value,
                district: document.getElementById('district').value,
                mauza: document.getElementById('mauza').value
            };

            // In a real application, you would send this data to your backend
            console.log('Form Data:', formData);
            
            // Show success message
            showAlert('success', 'Land record has been successfully submitted!');
            
            // Reset form after 2 seconds
            setTimeout(() => {
                resetForm();
            }, 2000);
        });

        // Show Alert Function
        function showAlert(type, message) {
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');
            
            if (type === 'success') {
                document.getElementById('successMessage').textContent = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                setTimeout(() => {
                    successAlert.style.display = 'none';
                }, 5000);
            } else {
                document.getElementById('errorMessage').textContent = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 5000);
            }
        }

        // Reset Form Function
        function resetForm() {
            document.getElementById('addRecordForm').reset();
            document.getElementById('addRecordForm').classList.remove('was-validated');
            removeImage('ownerPhoto');
            removeImage('propertyPhoto');
            
            // Hide alerts
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('errorAlert').style.display = 'none';
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
