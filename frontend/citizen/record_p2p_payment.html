<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record P2P Payment - TX20251119005</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #2e7d32; }
    .navbar { background: linear-gradient(135deg, var(--primary), #1b5e20); }
    .proof-box { background: #e8f5e9; border: 2px dashed var(--primary); border-radius: 15px; padding: 2rem; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="transfer_dashboard.html?id=TX20251119005">
      Back to Transfer
    </a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4>Record Off-Chain Payment (UC021)</h4>
        </div>
        <div class="card-body p-5">
<!-- P2P Payment Proof Modal (UC021) -->
<div class="modal fade" id="p2pModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="fas fa-money-check me-2"></i>Record P2P Payment Proof (UC021)</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="p2pForm">
          <div class="mb-3">
            <label class="form-label fw-bold">Amount Paid (PKR)</label>
            <input type="number" class="form-control" value="8500000" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Method</label>
            <select class="form-select">
              <option>Bank Transfer</option>
              <option>Cash</option>
              <option>Crypto</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Upload Proof</label>
            <input type="file" class="form-control" accept=".pdf,.jpg,.png" required>
          </div>
          <button type="submit" class="btn btn-success w-100">
            <i class="fas fa-save me-2"></i>Record on Blockchain & Notify Seller
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('p2pForm')?.addEventListener('submit', function(e) {
  e.preventDefault();
  alert('P2P Payment Proof Recorded!\nHash stored on blockchain.\nSeller notified.');
  bootstrap.Modal.getInstance(document.getElementById('p2pModal')).hide();
  // Update transfer dashboard status
  document.querySelector('.step.active .badge')?.remove();
});
</script>
          <div class="alert alert-info text-center">
            <strong>Transfer ID:</strong> TX20251119005<br>
            <strong>Amount Paid:</strong> PKR 8,500,000
          </div>

          <form>
            <div class="mb-4">
              <label class="form-label">Payment Method</label>
              <select class="form-select">
                <option>Cash</option>
                <option>Bank Transfer</option>
                <option>Crypto</option>
              </select>
            </div>

            <div class="proof-box text-center">
              <i class="fas fa-receipt fa-3x text-success mb-3"></i>
              <p><strong>Upload Proof</strong></p>
              <input type="file" class="form-control" accept=".pdf,.jpg">
              <small class="text-muted">Bank slip, crypto tx, signed receipt</small>
            </div>

            <div class="text-center mt-4">
              <button type="button" class="btn btn-success btn-lg px-5" onclick="submitProof()">
                Submit & Notify Seller
              </button>
            </div>
          </form>

          <div id="success" class="text-center mt-4" style="display:none;">
            <i class="fas fa-check-circle text-success fa-4x"></i>
            <h4>Proof Recorded on Blockchain!</h4>
            <p>Hash: <code>def456...789ghi</code></p>
            <a href="transfer_dashboard.html?id=TX20251119005" class="btn btn-success">
              Back to Transfer
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function submitProof() {
  document.querySelector('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
