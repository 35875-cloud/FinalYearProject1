<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Properties –  Land Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --primary: #667eea;
  --primary-dark: #5a67d8;
  --secondary: #764ba2;
  --success: #11998e;
  --warning: #f093fb;
  --danger: #f5576c;
}

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding-top: 80px;
}

.navbar {
  background: rgba(255, 255, 255, 0.98) !important;
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
}

.container {
  max-width: 1400px;
  padding: 2rem;
}

.page-header {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
}

.page-title {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

/* Accordion Style Property Cards */
.property-accordion {
  background: white;
  border-radius: 15px;
  margin-bottom: 1rem;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
  transition: all 0.3s ease;
}

.property-accordion:hover {
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
}

.property-header {
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
  transition: all 0.3s ease;
  border: 2px solid transparent;
}

.property-header:hover {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
  border-color: var(--primary);
}

.property-header.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-color: var(--primary);
}

.property-header.active .property-title,
.property-header.active .property-location,
.property-header.active .expand-icon {
  color: white !important;
}

.property-title-section {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.property-icon {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.5rem;
  flex-shrink: 0;
}

.property-header.active .property-icon {
  background: white;
  color: var(--primary);
}

.property-info {
  flex: 1;
}

.property-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 0.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.property-location {
  font-size: 0.9rem;
  color: #64748b;
  font-weight: 500;
}

.property-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

.expand-icon {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: rgba(102, 126, 234, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  font-size: 1.2rem;
  transition: all 0.3s ease;
}

.property-header.active .expand-icon {
  background: rgba(255, 255, 255, 0.2);
  transform: rotate(45deg);
}

.property-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.property-body.expanded {
  max-height: 2000px;
}

.property-content {
  padding: 2rem 1.5rem;
  border-top: 1px solid #e5e7eb;
}

.property-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.detail-item {
  padding: 1rem;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
  border-radius: 12px;
  border: 1px solid rgba(102, 126, 234, 0.1);
  transition: all 0.3s ease;
}

.detail-item:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.15);
}

.detail-label {
  font-size: 0.8rem;
  color: #64748b;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.detail-label i {
  color: var(--primary);
  font-size: 0.9rem;
}

.detail-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: #1a1a1a;
  word-break: break-word;
}

.status-badge {
  padding: 0.5rem 1rem;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.85rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.status-approved {
  background: linear-gradient(135deg, #11998e, #38ef7d);
  color: white;
  box-shadow: 0 3px 10px rgba(17, 153, 142, 0.3);
}

.status-pending {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: white;
  box-shadow: 0 3px 10px rgba(240, 147, 251, 0.3);
}

.status-frozen {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
}

.status-rejected {
  background: linear-gradient(135deg, #f5576c, #d32f2f);
  color: white;
  box-shadow: 0 3px 10px rgba(245, 87, 108, 0.3);
}

.blockchain-section {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
  padding: 1.5rem;
  border-radius: 15px;
  border: 2px solid var(--primary);
  margin-bottom: 1.5rem;
}

.blockchain-section h6 {
  color: var(--primary-dark);
  font-weight: 700;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.blockchain-section h6 i {
  font-size: 1.2rem;
}

.blockchain-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  background: white;
  border: 2px solid var(--primary);
  border-radius: 12px;
  color: var(--primary-dark);
  font-weight: 700;
  font-size: 0.95rem;
}

.action-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.btn-action {
  padding: 0.75rem 1.5rem;
  border-radius: 10px;
  font-weight: 600;
  border: none;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-blockchain {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}

.btn-blockchain:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
  color: white;
}

.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  background: white;
  border-radius: 20px;
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
}

.empty-state i {
  font-size: 5rem;
  color: #e0e0e0;
  margin-bottom: 1.5rem;
}

.loading-spinner {
  text-align: center;
  padding: 3rem;
}

.property-count {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 0.75rem 1.5rem;
  border-radius: 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}

@media (max-width: 768px) {
  .property-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
  }
  
  .property-meta {
    width: 100%;
    justify-content: space-between;
  }
  
  .property-details-grid {
    grid-template-columns: 1fr;
  }
  
  .action-buttons {
    flex-direction: column;
  }
  
  .btn-action {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="citizen_dashboard.html" style="color: var(--primary-dark);">
      <i class="fas fa-landmark me-2"></i>Land Records
    </a>
    <div class="d-flex align-items-center gap-2">
      <span class="user-name" style="color: var(--primary-dark); font-weight: 600;">Loading...</span>
      <a href="../auth/login.html" class="btn btn-outline-primary btn-sm" onclick="event.preventDefault(); performLogout();">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container">
  
  <!-- Page Header -->
  <div class="page-header">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h1 class="page-title mb-2">
          <i class="fas fa-home me-2"></i>My Properties
        </h1>
        <p class="text-muted mb-0">Click on any property to view detailed information</p>
      </div>
      <div class="property-count" id="propertyCount">
        <i class="fas fa-home"></i>
        <span>0 Properties</span>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loadingSpinner" class="loading-spinner">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-white">Loading your properties...</p>
  </div>

  <!-- Properties List (Accordion Style) -->
  <div id="propertiesList" style="display: none;">
    <!-- Properties will be dynamically loaded here -->
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state" style="display: none;">
    <i class="fas fa-home"></i>
    <h3 class="mb-3">No Properties Found</h3>
    <p class="text-muted mb-4">You don't have any registered properties yet.</p>
    <p class="text-muted">Properties will appear here once registered by the Land Record Officer.</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Configuration
const API_URL = 'http://localhost:5000/api';

// Authentication check
const authToken = sessionStorage.getItem('authToken');
const userId = sessionStorage.getItem('userId');
const userRole = sessionStorage.getItem('userRole');

if (!authToken || !userId) {
  alert('Please login first');
  window.location.href = '../auth/login.html';
}

// Load user info
function loadUserInfo() {
  const userName = sessionStorage.getItem('userName');
  if (userName) {
    document.querySelector('.user-name').textContent = userName;
  }
}

// Toggle property details
function toggleProperty(propertyId) {
  const header = document.querySelector(`[data-property="${propertyId}"]`);
  const body = document.getElementById(`property-body-${propertyId}`);
  
  // Close all other properties
  document.querySelectorAll('.property-header').forEach(h => {
    if (h.dataset.property !== propertyId) {
      h.classList.remove('active');
      const otherBody = document.getElementById(`property-body-${h.dataset.property}`);
      if (otherBody) {
        otherBody.classList.remove('expanded');
      }
    }
  });
  
  // Toggle current property
  header.classList.toggle('active');
  body.classList.toggle('expanded');
}

// Get status badge HTML
function getStatusBadge(status) {
  const statusMap = {
    'APPROVED': { class: 'status-approved', icon: 'fa-check-circle', text: 'Approved' },
    'PENDING_APPROVAL': { class: 'status-pending', icon: 'fa-clock', text: 'Pending' },
    'FROZEN': { class: 'status-frozen', icon: 'fa-snowflake', text: 'Frozen' },
    'REJECTED': { class: 'status-rejected', icon: 'fa-times-circle', text: 'Rejected' }
  };
  
  const statusInfo = statusMap[status] || statusMap['PENDING_APPROVAL'];
  return `<span class="status-badge ${statusInfo.class}">
    <i class="fas ${statusInfo.icon}"></i>
    ${statusInfo.text}
  </span>`;
}

// Load properties
async function loadProperties() {
  const loadingSpinner = document.getElementById('loadingSpinner');
  const propertiesList = document.getElementById('propertiesList');
  const emptyState = document.getElementById('emptyState');
  const propertyCount = document.getElementById('propertyCount');

  try {
    const response = await fetch(`${API_URL}/properties/my-properties`, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      }
    });

    const result = await response.json();

    if (result.success && result.properties.length > 0) {
      const properties = result.properties;
      
      // Update property count
      propertyCount.innerHTML = `
        <i class="fas fa-home"></i>
        <span>${properties.length} ${properties.length === 1 ? 'Property' : 'Properties'}</span>
      `;
      
      // Generate accordion items
      propertiesList.innerHTML = properties.map(property => `
        <div class="property-accordion">
          <!-- Property Header (Clickable) -->
          <div class="property-header" data-property="${property.property_id}" onclick="toggleProperty('${property.property_id}')">
            <div class="property-title-section">
              <div class="property-icon">
                <i class="fas fa-home"></i>
              </div>
              <div class="property-info">
                <div class="property-title">
                  ${property.property_id}
                  ${getStatusBadge(property.status)}
                </div>
                <div class="property-location">
                  <i class="fas fa-map-marker-alt me-1"></i>
                  ${property.district}, ${property.tehsil} • ${property.area_marla} Marla • Fard: ${property.fard_no}
                </div>
              </div>
            </div>
            <div class="property-meta">
              <div class="expand-icon">
                <i class="fas fa-plus"></i>
              </div>
            </div>
          </div>

          <!-- Property Body (Expandable) -->
          <div class="property-body" id="property-body-${property.property_id}">
            <div class="property-content">
              
              <!-- Blockchain Security Badge -->
              <div class="blockchain-section">
                <h6><i class="fas fa-shield-alt"></i>Blockchain Secured Property</h6>
                <div class="blockchain-badge">
                  <i class="fas fa-check-circle"></i>
                  Immutably recorded on blockchain
                </div>
              </div>

              <!-- Owner Information -->
              <h6 class="mb-3" style="color: var(--primary-dark); font-weight: 700;">
                <i class="fas fa-user me-2"></i>Owner Information
              </h6>
              <div class="property-details-grid">
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-user"></i>
                    Owner Name
                  </div>
                  <div class="detail-value">${property.owner_name}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-id-card"></i>
                    Owner CNIC
                  </div>
                  <div class="detail-value">${formatCNIC(property.owner_cnic)}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-user-tie"></i>
                    Father's Name
                  </div>
                  <div class="detail-value">${property.father_name}</div>
                </div>
              </div>

              <!-- Property Details -->
              <h6 class="mb-3 mt-4" style="color: var(--primary-dark); font-weight: 700;">
                <i class="fas fa-info-circle me-2"></i>Property Details
              </h6>
              <div class="property-details-grid">
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-file-alt"></i>
                    Fard Number
                  </div>
                  <div class="detail-value">${property.fard_no}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-file-alt"></i>
                    Khasra Number
                  </div>
                  <div class="detail-value">${property.khasra_no}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-file-alt"></i>
                    Khatooni Number
                  </div>
                  <div class="detail-value">${property.khatooni_no}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-ruler-combined"></i>
                    Area
                  </div>
                  <div class="detail-value">${property.area_marla} Marla</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-building"></i>
                    Property Type
                  </div>
                  <div class="detail-value">${capitalizeFirst(property.property_type)}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-calendar"></i>
                    Registered On
                  </div>
                  <div class="detail-value">${formatDate(property.created_at)}</div>
                </div>
              </div>

              <!-- Location Details -->
              <h6 class="mb-3 mt-4" style="color: var(--primary-dark); font-weight: 700;">
                <i class="fas fa-map-marker-alt me-2"></i>Location Details
              </h6>
              <div class="property-details-grid">
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-map"></i>
                    District
                  </div>
                  <div class="detail-value">${property.district}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-map-pin"></i>
                    Tehsil
                  </div>
                  <div class="detail-value">${property.tehsil}</div>
                </div>
                ${property.mauza ? `
                <div class="detail-item">
                  <div class="detail-label">
                    <i class="fas fa-location-dot"></i>
                    Mauza
                  </div>
                  <div class="detail-value">${property.mauza}</div>
                </div>
                ` : ''}
                ${property.address ? `
                <div class="detail-item" style="grid-column: 1 / -1;">
                  <div class="detail-label">
                    <i class="fas fa-address-card"></i>
                    Address
                  </div>
                  <div class="detail-value">${property.address}</div>
                </div>
                ` : ''}
              </div>

              <!-- Action Buttons -->
              <div class="action-buttons mt-4">
                <button class="btn-action btn-blockchain" onclick="viewBlockchainHistory('${property.property_id}')">
                  <i class="fas fa-history"></i>
                  View Blockchain History
                </button>
              </div>

            </div>
          </div>
        </div>
      `).join('');

      loadingSpinner.style.display = 'none';
      propertiesList.style.display = 'block';
    } else {
      loadingSpinner.style.display = 'none';
      emptyState.style.display = 'block';
      propertyCount.innerHTML = '<i class="fas fa-home"></i><span>0 Properties</span>';
    }

  } catch (error) {
    console.error('Error loading properties:', error);
    loadingSpinner.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = `
      <i class="fas fa-exclamation-triangle" style="color: #f44336;"></i>
      <h3 class="mb-3">Error Loading Properties</h3>
      <p class="text-muted">Unable to connect to the server. Please try again later.</p>
    `;
  }
}

// View blockchain history
function viewBlockchainHistory(propertyId) {
  alert(`Blockchain History for ${propertyId}\n\nThis feature will show:\n• All transactions\n• Transfer history\n• Verification records\n• Immutable blockchain proof`);
  // TODO: Implement blockchain history modal
}

// Utility functions
function formatCNIC(cnic) {
  if (!cnic || cnic.length !== 13) return cnic;
  return `${cnic.slice(0,5)}-${cnic.slice(5,12)}-${cnic.slice(12)}`;
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('en-PK', { 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric'
  });
}

function capitalizeFirst(str) {
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

function performLogout() {
  sessionStorage.clear();
  window.location.href = '../auth/login.html';
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  loadUserInfo();
  loadProperties();
});
</script>

</body>
</html>
