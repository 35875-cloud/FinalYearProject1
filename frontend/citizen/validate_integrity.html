<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validate Integrity - Blockchain Land Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #2e7d32; }
    body { background: #f8f9fa; }
    .navbar { background: linear-gradient(135deg, var(--primary), #1b5e20); }
    .upload-zone { border: 3px dashed var(--primary); border-radius: 15px; padding: 3rem; text-align: center; background: #f1f8e9; }
    .result { padding: 2rem; border-radius: 12px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="citizen_dashboard.html">Back to Dashboard</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4>Validate Any Document (UC016)</h4>
        </div>
        <div class="card-body p-5">

          <div class="upload-zone mb-4">
            <i class="fas fa-cloud-upload-alt fa-4x text-success mb-3"></i>
            <p class="lead">Drop your Fard, Sale Deed, or Challan here</p>
            <input type="file" class="form-control" accept=".pdf,.jpg,.png">
          </div>

          <div class="input-group mb-4">
            <span class="input-group-text">Stored Hash</span>
            <input type="text" class="form-control" placeholder="Paste hash from system">
          </div>

          <div class="text-center">
            <button class="btn btn-success btn-lg px-5" onclick="validate()">
              Validate Integrity
            </button>
          </div>

          <div id="result" class="mt-5 result" style="display:none;">
            <h5 class="text-success text-center">
              <i class="fas fa-check-circle fa-2x"></i> 100% Genuine!
            </h5>
            <p class="text-center">This document matches the blockchain record.</p>
            <p><strong>Hash:</strong> <code>abc123...xyz789</code></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function validate() {
  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
