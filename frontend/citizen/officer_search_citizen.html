<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Citizen Record – Officer Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --p: #2e7d32; --pd: #1b5e20; }
    body { background: #f0f7f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(135deg, #000, var(--pd)); }
    .result-card { border: 2px solid var(--p); border-radius: 15px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="officer_dashboard.html">
      <i class="fas fa-arrow-left me-2"></i> Officer Dashboard
    </a>
  </div>
</nav>

<div class="container py-5">
  <h2 class="text-center text-success mb-5">
    <i class="fas fa-search"></i> Search Citizen Record
  </h2>

  <!-- Search Box -->
  <div class="row justify-content-center mb-5">
    <div class="col-lg-7">
      <div class="input-group input-group-lg">
        <input type="text" class="form-control text-center" placeholder="Enter CNIC – 35202-1234567-1" id="cnicInput">
        <button class="btn btn-success px-5" onclick="searchCitizen()">
          <i class="fas fa-search"></i> Search
        </button>
      </div>
    </div>
  </div>

  <!-- Result Card (Hidden until search) -->
  <div class="card result-card shadow-lg mt-4" id="resultCard" style="display:none;">
    <div class="card-header bg-success text-white text-center">
      <h4 class="mb-0"><i class="fas fa-user"></i> Citizen Found</h4>
    </div>
    <div class="card-body text-center py-5">
      <h3 class="text-success">Ahmed Ali</h3>
      <p class="lead">CNIC: <strong>35202-1234567-1</strong></p>
      <p class="fs-5">
        Owned Properties: <strong class="text-primary">12</strong><br>
        Active Transfers: <strong class="text-warning">2</strong><br>
        Frozen Properties: <strong class="text-danger">1</strong>
      </p>
      <hr>
      <!-- THIS IS THE FIXED LINK – GOES TO OFFICER VIEW, NOT CITIZEN -->
      <a href="officer_citizen_properties.html" class="btn btn-success btn-lg px-5">
        <i class="fas fa-home"></i> View All Properties (Officer View)
      </a>
    </div>
  </div>
</div>

<script>
function searchCitizen() {
  const cnic = document.getElementById('cnicInput').value.trim();
  if (cnic === "35202-1234567-1" || cnic.length === 15) {
    document.getElementById('resultCard').style.display = 'block';
  } else {
    alert("Please enter a valid CNIC");
  }
}
</script>
</body>
</html>
