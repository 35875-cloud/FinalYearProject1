<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC Dashboard - PLRA Punjab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #1565c0;
      --primary-dark: #0d47a1;
      --success: #11998e;
      --danger: #f5576c;
    }
    
    body {
      background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-top: 80px;
    }
    
    .navbar {
      background: rgba(255, 255, 255, 0.98) !important;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    
    .container-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .page-header {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    
    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .card-item {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      border-left: 6px solid var(--primary);
    }
    
    .btn-forward {
      background: linear-gradient(135deg, var(--success), #38ef7d);
      color: white;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark fixed-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" style="color: var(--primary-dark);">
      <i class="fas fa-user-shield me-2"></i>AC Dashboard
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="badge bg-primary">
        <span id="pendingCount">0</span> Pending
      </span>
      <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container-main">
  <div class="page-header">
    <h1 class="page-title">Properties Pending AC Approval</h1>
    <p class="text-muted">Review and select DC to forward for final approval</p>
  </div>

  <div id="propertiesList">
    <div class="text-center py-5">
      <i class="fas fa-spinner fa-spin fa-3x"></i>
    </div>
  </div>
</div>

<!-- Forward to DC Modal -->
<div class="modal fade" id="forwardModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Forward to DC</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Property ID:</strong> <span id="forwardPropertyId"></span></p>
        <div class="mb-3">
          <label class="form-label">Select DC <span class="text-danger">*</span></label>
          <select class="form-select" id="selectedDc" required></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Comments</label>
          <textarea class="form-control" id="forwardComments" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="confirmForward()">Forward</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:5000/api';
const authToken = sessionStorage.getItem('authToken');
let currentPropertyId = null;

async function loadProperties() {
  try {
    const res = await fetch(`${API_URL}/properties/ac-pending`, {
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    const result = await res.json();
    
    if (result.success && result.properties.length > 0) {
      document.getElementById('pendingCount').textContent = result.properties.length;
      document.getElementById('propertiesList').innerHTML = result.properties.map(p => `
        <div class="card-item">
          <h5>${p.property_id}</h5>
          <p><strong>Owner:</strong> ${p.owner_name} | <strong>CNIC:</strong> ${p.owner_cnic}</p>
          <p><strong>Location:</strong> ${p.mauza}, ${p.tehsil}, ${p.district}</p>
          <p><strong>Forwarded by Tehsildar:</strong> ${p.tehsildar_name}</p>
          <button class="btn btn-success" onclick="openForwardModal('${p.property_id}')">
            Forward to DC
          </button>
        </div>
      `).join('');
    } else {
      document.getElementById('propertiesList').innerHTML = '<p class="text-center">No pending properties</p>';
    }
  } catch (err) {
    console.error(err);
  }
}

async function loadDCs() {
  const res = await fetch(`${API_URL}/properties/get-dcs`, {
    headers: { 'Authorization': `Bearer ${authToken}` }
  });
  const result = await res.json();
  document.getElementById('selectedDc').innerHTML = 
    '<option value="">Select DC</option>' + 
    result.dcs.map(dc => `<option value="${dc.user_id}">${dc.name} - ${dc.district}</option>`).join('');
}

function openForwardModal(propertyId) {
  currentPropertyId = propertyId;
  document.getElementById('forwardPropertyId').textContent = propertyId;
  loadDCs();
  new bootstrap.Modal(document.getElementById('forwardModal')).show();
}

async function confirmForward() {
  const dcId = document.getElementById('selectedDc').value;
  if (!dcId) return alert('Select a DC');
  
  const res = await fetch(`${API_URL}/properties/ac-forward-to-dc`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      propertyId: currentPropertyId,
      assignedDcId: dcId,
      comments: document.getElementById('forwardComments').value
    })
  });
  
  const result = await res.json();
  if (result.success) {
    alert('Forwarded to DC');
    bootstrap.Modal.getInstance(document.getElementById('forwardModal')).hide();
    loadProperties();
  }
}

function logout() {
  sessionStorage.removeItem('authToken');
  window.location.href = '../auth/login.html';
}

loadProperties();
</script>
</body>
</html>
