<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DC Dashboard - PLRA Punjab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      min-height: 100vh;
      padding-top: 80px;
    }
    .card-item {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 6px solid #2e7d32;
    }
    .btn-approve {
      background: linear-gradient(135deg, #2e7d32, #388e3c);
      color: white;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-light fixed-top" style="background: white;">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold">
      <i class="fas fa-user-tie me-2"></i>DC Dashboard - Final Approval
    </span>
    <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">
  <div class="bg-white rounded p-4 mb-4">
    <h1>Properties Pending DC Final Approval</h1>
    <p class="text-muted">Review and approve properties to make them visible to citizens</p>
  </div>

  <div id="propertiesList">
    <div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
  </div>
</div>

<!-- Approve Modal -->
<div class="modal fade" id="approveModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Final Approval</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Property ID:</strong> <span id="approvePropertyId"></span></p>
        <div class="alert alert-success">
          <i class="fas fa-check-circle"></i> This will approve the property and make it visible to the citizen.
        </div>
        <div class="mb-3">
          <label class="form-label">Comments</label>
          <textarea class="form-control" id="approveComments" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="confirmApprove()">
          <i class="fas fa-check"></i> Approve Property
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:5000/api';
const authToken = sessionStorage.getItem('authToken');
let currentPropertyId = null;

async function loadProperties() {
  try {
    const res = await fetch(`${API_URL}/properties/dc-pending`, {
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    const result = await res.json();
    
    if (result.success && result.properties.length > 0) {
      document.getElementById('propertiesList').innerHTML = result.properties.map(p => `
        <div class="card-item">
          <h4>${p.property_id}</h4>
          <p><strong>Owner:</strong> ${p.owner_name} | <strong>CNIC:</strong> ${p.owner_cnic}</p>
          <p><strong>Father Name:</strong> ${p.father_name}</p>
          <p><strong>Location:</strong> ${p.mauza}, ${p.tehsil}, ${p.district}</p>
          <p><strong>Khewat:</strong> ${p.khewat_no || p.fard_no} | <strong>Khasra:</strong> ${p.khasra_no} | <strong>Khatooni:</strong> ${p.khatooni_no}</p>
          <p><strong>Area:</strong> ${p.area_marla} Marla | <strong>Year:</strong> ${p.year}</p>
          <p><strong>Approved by AC:</strong> ${p.ac_name} | <strong>Tehsildar:</strong> ${p.tehsildar_name}</p>
          <hr>
          <button class="btn btn-success btn-lg" onclick="openApproveModal('${p.property_id}')">
            <i class="fas fa-check-circle"></i> Final Approve
          </button>
          <button class="btn btn-danger ms-2" onclick="rejectProperty('${p.property_id}')">
            <i class="fas fa-times"></i> Reject
          </button>
        </div>
      `).join('');
    } else {
      document.getElementById('propertiesList').innerHTML = 
        '<div class="bg-white rounded p-5 text-center"><p>No pending properties</p></div>';
    }
  } catch (err) {
    console.error(err);
  }
}

function openApproveModal(propertyId) {
  currentPropertyId = propertyId;
  document.getElementById('approvePropertyId').textContent = propertyId;
  document.getElementById('approveComments').value = '';
  new bootstrap.Modal(document.getElementById('approveModal')).show();
}

async function confirmApprove() {
  const comments = document.getElementById('approveComments').value;
  
  const res = await fetch(`${API_URL}/properties/dc-approve`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      propertyId: currentPropertyId,
      comments: comments
    })
  });
  
  const result = await res.json();
  if (result.success) {
    alert('✅ Property Approved! Now visible to citizen.');
    bootstrap.Modal.getInstance(document.getElementById('approveModal')).hide();
    loadProperties();
  } else {
    alert('Error: ' + result.message);
  }
}

async function rejectProperty(propertyId) {
  const reason = prompt('Enter rejection reason:');
  if (!reason) return;
  
  const res = await fetch(`${API_URL}/properties/reject-in-chain`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ propertyId, reason })
  });
  
  const result = await res.json();
  if (result.success) {
    alert('Property rejected');
    loadProperties();
  }
}

function logout() {
  sessionStorage.removeItem('authToken');
  window.location.href = '../auth/login.html';
}

loadProperties();
</script>
</body>
</html>
