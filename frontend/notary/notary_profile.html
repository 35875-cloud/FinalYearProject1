<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notary Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
  --primary: #2e7d32;
  --dark: #1b5e20;
  --bg: #eaf4eb;
  --text-dark: #1b1b1b;
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text-dark);
}

.navbar {
  background: linear-gradient(135deg, #000, var(--dark));
  padding: 1rem 1.5rem;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.navbar-brand {
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

.container {
  max-width: 600px;
}

i.fa-gavel {
  color: var(--primary);
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

h2 {
  font-weight: 700;
  margin-bottom: 0.3rem;
}

p.lead {
  font-size: 1.1rem;
  color: #555;
  margin-bottom: 2rem;
}

.card {
  border-radius: 18px;
  overflow: hidden;
  border: none;
  background: #ffffff;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.25);
}

.card h5 {
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.card p {
  font-size: 1rem;
  color: #444;
  margin-bottom: 1rem;
}

.badge {
  font-size: 1.1rem;
  padding: 0.6em 1em;
}


  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="notary_dashboard.html">Back</a>
  </div>
</nav>

<div class="container py-5 text-center">
  <i class="fas fa-gavel fa-5x mb-4"></i>
  <h2>Muhammad Asif</h2>
  <p class="lead">Licensed Notary Public</p>
  <div class="card shadow d-inline-block p-4 mt-3">
    <h5>License: NOTARY-PB-2025-089</h5>
    <p>
      Valid until: 31 Dec 2027<br>
      Total Deeds: <strong>1,284</strong>
    </p>
    <span class="badge bg-success">ACTIVE</span>
  </div>
</div>

</body>
</html>
