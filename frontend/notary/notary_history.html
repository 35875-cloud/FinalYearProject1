<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notary History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
  --primary: #2e7d32;
  --dark: #1b5e20;
  --bg: #eaf4eb;
  --text-dark: #1b1b1b;
}

body {
  background: var(--bg);
  font-family: "Inter", sans-serif;
}

.navbar {
  background: linear-gradient(135deg, #000, var(--dark));
  padding: 1rem 1.5rem;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.navbar-brand {
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

h2 {
  font-weight: 700;
  color: var(--primary) !important;
  text-shadow: 0px 2px 3px rgba(46, 125, 50, 0.25);
}

/* Card Styling */
.card {
  border-radius: 18px;
  overflow: hidden;
  border: none;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  background: #ffffff;
  animation: fadeIn 0.5s ease-in-out;
}

/* Table Styling */
table {
  border-radius: 15px;
  overflow: hidden;
}

.table-success {
  background: var(--primary) !important;
  color: #fff !important;
  font-size: 1.05rem;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.table tbody tr {
  transition: 0.3s ease-in-out;
}

.table tbody tr:hover {
  background: rgba(46, 125, 50, 0.1);
  cursor: pointer;
}

.code {
  color: var(--dark);
}

/* Smooth Fade Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="notary_dashboard.html">Back</a>
  </div>
</nav>

<div class="container py-5">
  <h2 class="text-center text-success mb-5">My Notarization History</h2>

  <div class="card">
    <div class="card-body">
      <table class="table">
        <thead class="table-success">
          <tr><th>Date</th><th>Property ID</th><th>Type</th><th>Hash</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>20 Nov 2025</td>
            <td>PK-PB-LHR-2025-000123</td>
            <td>Sale Deed</td>
            <td><code>abc123...</code></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
