<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notary Payment Proofs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #f0f7f0; font-family: 'Segoe UI', sans-serif; }
  .navbar { background: linear-gradient(135deg, #000, #1b5e20); }
  .table-wrapper { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .btn-confirm { min-width: 140px; }
  .status-verified { color: #2e7d32; font-weight: bold; }
  .status-pending { color: #f57c00; font-weight: bold; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="notary_dashboard.html">
      <i class="fas fa-arrow-left"></i> Back
    </a>
  </div>
</nav>

<div class="container py-5">
  <h2 class="text-center text-success mb-4">Verify Off-Chain Payment Proofs (UC021)</h2>

  <div class="table-wrapper">
    <table class="table table-hover align-middle">
      <thead class="table-success">
        <tr>
          <th>Date</th>
          <th>Amount (PKR)</th>
          <th>Method</th>
          <th>Hash</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>20 Nov 2025</td>
          <td>8,500,000</td>
          <td>Bank Transfer</td>
          <td><code>p2p20251120-789ghi...</code></td>
          <td class="status-verified">Verified</td>
          <td>
            <button class="btn btn-success btn-sm btn-confirm">
              <i class="fas fa-check-circle"></i> Confirm & Sign
            </button>
          </td>
        </tr>
        <tr>
          <td>19 Nov 2025</td>
          <td>5,200,000</td>
          <td>Bank Transfer</td>
          <td><code>p2p20251119-456abc...</code></td>
          <td class="status-verified">Verified</td>
          <td>
            <button class="btn btn-success btn-sm btn-confirm">
              <i class="fas fa-check-circle"></i> Confirm & Sign
            </button>
          </td>
        </tr>
        <tr>
          <td>18 Nov 2025</td>
          <td>3,750,000</td>
          <td>Bank Transfer</td>
          <td><code>p2p20251118-123xyz...</code></td>
          <td class="status-pending">Pending</td>
          <td>
            <button class="btn btn-secondary btn-sm btn-confirm" disabled>
              <i class="fas fa-clock"></i> Waiting
            </button>
          </td>
        </tr>
        <!-- Add more rows as needed -->
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
