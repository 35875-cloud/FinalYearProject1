<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notarize Sale Deed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --p: #2e7d32; --pd: #1b5e20; }
    body { background: #f0f7f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(135deg, #000, var(--pd)); }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="notary_dashboard.html">Back to Dashboard</a>
  </div>
</nav>

<div class="container py-5">
  <h2 class="text-center text-success mb-5">Notarize Sale Deed</h2>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-body p-5">
          <div class="row g-3 mb-4">
            <div class="col-md-6"><input type="text" class="form-control form-control-lg" placeholder="Seller CNIC"></div>
            <div class="col-md-6"><input type="text" class="form-control form-control-lg" placeholder="Buyer CNIC"></div>
            <div class="col-md-12"><input type="text" class="form-control form-control-lg" placeholder="Property ID"></div>
            <div class="col-md-12"><input type="file" class="form-control form-control-lg" accept=".pdf"></div>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="confirm">
            <label class="form-check-label fs-5" for="confirm">
              I confirm both parties appeared in person with original CNICs
            </label>
          </div>

          <div class="text-center">
            <button class="btn btn-success btn-lg px-5">
              <i class="fas fa-stamp"></i> Notarize & Upload to Blockchain
            </button>
          </div>

          <div class="alert alert-success text-center mt-4" style="display:none;" id="success">
            <h4>Deed Notarized Successfully!</h4>
            <p>Hash: <code>notary20251120-089-abc123...</code></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
