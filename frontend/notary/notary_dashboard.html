<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notary Dashboard - Blockchain Land Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --p: #2e7d32; --pd: #1b5e20; --light: #f0f7f0; }
    body { background: var(--light); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar { background: linear-gradient(135deg, #000, var(--pd)); }
    .stat-card { background: white; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 2rem; text-align: center; }
    .menu-card { border-radius: 20px; height: 100%; transition: all 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
    .menu-card:hover { transform: translateY(-12px); }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-4" href="#">
      <i class="fas fa-gavel text-gold me-2"></i> NOTARY PUBLIC
    </a>
    <div class="text-white">
      <i class="fas fa-id-badge"></i> License: NOTARY-PB-2025-089 | <strong>Muhammad Asif</strong>
    </div>
  </div>
</nav>

<div class="container py-5">

  <!-- Stats Row -->
  <div class="row g-4 mb-5">
    <div class="col-md-4"><div class="stat-card"><h2 class="text-primary">42</h2><p>Deeds Notarized Today</p></div></div>
    <div class="col-md-4"><div class="stat-card"><h2 class="text-success">1,284</h2><p>Total Since License</p></div></div>
    <div class="col-md-4"><div class="stat-card"><h2 class="text-warning">3</h2><p>Pending Verification</p></div></div>
  </div>

  <!-- Menu Row 1 -->
  <div class="row g-4">
    <div class="col-md-6">
      <a href="notary_notarize_deed.html" class="text-decoration-none">
        <div class="card menu-card text-white text-center p-5" style="background: linear-gradient(135deg, var(--p), var(--pd));">
          <i class="fas fa-file-signature fa-5x mb-4"></i>
          <h3>Notarize New Sale Deed</h3>
        </div>
      </a>
    </div>

    <div class="col-md-6">
      <a href="notary_verify_document.html" class="text-decoration-none">
        <div class="card menu-card text-white text-center p-5" style="background: linear-gradient(135deg, #1976d2, #0d47a1);">
          <i class="fas fa-shield-alt fa-5x mb-4"></i>
          <h3>Verify Document Authenticity</h3>
        </div>
      </a>
    </div>
  </div>

  <!-- Menu Row 2 -->
  <div class="row g-4 mt-3">
    <div class="col-md-6">
      <a href="notary_profile.html" class="text-decoration-none">
        <div class="card menu-card text-white text-center p-5" style="background: linear-gradient(135deg, #4c6f92, #0d23a1);">
          <i class="fas fa-user fa-5x mb-4"></i>
          <h3>Profile</h3>
        </div>
      </a>
    </div>

    <div class="col-md-6">
      <a href="notary_history.html" class="text-decoration-none">
        <div class="card menu-card text-white text-center p-5" style="background: linear-gradient(135deg, #59924c, #0da132);">
          <i class="fas fa-history fa-5x mb-4"></i>
          <h3>History</h3>
        </div>
      </a>
    </div>
  </div>

  <!-- Menu Row 3 -->
  <div class="row g-4 mt-3">
    <div class="col-md-6">
      <a href="notary_p2p_proof.html" class="text-decoration-none">
        <div class="card menu-card text-white text-center p-5" style="background: linear-gradient(135deg, #927e4c, #b7e817);">
          <i class="fas fa-money-bill-wave fa-5x mb-4"></i>
          <h3>Payment Proof</h3>
        </div>
      </a>
    </div>
  </div>
  

</div>

</body>
</html>
