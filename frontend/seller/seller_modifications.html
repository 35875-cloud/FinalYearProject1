<script>
/**
 * Accept transfer and start chat
 */
async function acceptAndStartChat(transferId, channelId) {
    if (!confirm('Accept this transfer request and start negotiation?')) {
        return;
    }
    
    try {
        const token = getToken();
        
        // 1. Accept the transfer
        const acceptResponse = await fetch(`/api/transfers/${transferId}/accept`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        const acceptData = await acceptResponse.json();
        
        if (!acceptData.success) {
            throw new Error(acceptData.error);
        }
        
        // 2. Activate the channel
        const activateResponse = await fetch(`/api/channels/${channelId}/activate`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        const activateData = await activateResponse.json();
        
        if (!activateData.success) {
            throw new Error(activateData.error);
        }
        
        // 3. Open negotiation page
        window.location.href = `../buyer/transfer_negotiation.html?channelId=${channelId}`;
        
    } catch (error) {
        console.error('Error accepting transfer:', error);
        alert('Failed to accept transfer: ' + error.message);
    }
}

/**
 * Reject transfer request
 */
async function rejectTransfer(transferId) {
    const reason = prompt('Please provide a reason for rejection (optional):');
    
    if (reason === null) {
        return; // User cancelled
    }
    
    try {
        const token = getToken();
        
        const response = await fetch(`/api/transfers/${transferId}/reject`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ reason })
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error);
        }
        
        alert('Transfer request rejected');
        loadPendingTransfers(); // Refresh the list
        
    } catch (error) {
        console.error('Error rejecting transfer:', error);
        alert('Failed to reject transfer: ' + error.message);
    }
}

/**
 * Load pending transfer requests
 * MODIFY YOUR EXISTING FUNCTION
 */
async function loadPendingTransfers() {
    try {
        const userId = getUserId();
        const token = getToken();
        
        const response = await fetch(`/api/transfers/seller/${userId}/pending`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error);
        }
        
        const tbody = document.querySelector('#pendingTransfersTable tbody');
        tbody.innerHTML = '';
        
        data.transfers.forEach(transfer => {
            const row = document.createElement('tr');
            row.setAttribute('data-transfer-id', transfer.transfer_id);
            
            // Add new request indicator if created in last 24 hours
            const isNew = (Date.now() - new Date(transfer.created_at)) < 86400000;
            
            row.innerHTML = `
                <td>
                    ${transfer.transfer_id}
                    ${isNew ? '<span class="new-request-badge"></span>' : ''}
                </td>
                <td>
                    <div class="property-info">
                        <span class="property-id">${transfer.property_id}</span>
                        <span class="property-location">${transfer.property_location || ''}</span>
                    </div>
                </td>
                <td>${transfer.buyer_name || 'Unknown'}</td>
                <td>${formatDate(transfer.created_at)}</td>
                <td><span class="status-badge status-pending">Pending</span></td>
                <td class="actions-cell">
                    <button class="btn-accept" onclick="acceptAndStartChat('${transfer.transfer_id}', '${transfer.channel_id}')">
                        ✓ Accept & Start Chat
                    </button>
                    <button class="btn-reject" onclick="rejectTransfer('${transfer.transfer_id}')">
                        ✗ Reject
                    </button>
                </td>
            `;
            
            tbody.appendChild(row);
        });
        
        // Update count badge
        updatePendingCount(data.transfers.length);
        
    } catch (error) {
        console.error('Error loading pending transfers:', error);
    }
}

/**
 * Load active negotiations
 */
async function loadActiveNegotiations() {
    try {
        const userId = getUserId();
        const token = getToken();
        
        // Get user's channels
        const response = await fetch(`/api/channels/my-channels?userId=${userId}`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error);
        }
        
        // Filter for active channels only
        const activeChannels = data.channels.filter(ch => 
            ['ACTIVE', 'NEGOTIATING', 'AGREED'].includes(ch.channel_status)
        );
        
        const tbody = document.querySelector('#activeNegotiationsTable tbody');
        tbody.innerHTML = '';
        
        if (activeChannels.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No active negotiations</td></tr>';
            return;
        }
        
        activeChannels.forEach(channel => {
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>${channel.transfer_id || 'N/A'}</td>
                <td>${channel.property_id}</td>
                <td>${channel.buyer_name || 'Buyer'}</td>
                <td>
                    <span class="channel-status-badge" data-status="${channel.channel_status}">
                        ${getStatusEmoji(channel.channel_status)} ${channel.channel_status}
                    </span>
                </td>
                <td>
                    ${channel.unread_count > 0 ? 
                        `<span class="unread-badge" data-count="${channel.unread_count}">${channel.unread_count}</span>` : 
                        '-'}
                </td>
                <td>
                    <button class="btn-chat" onclick="openNegotiation('${channel.channel_id}')">
                        💬 Open Chat
                    </button>
                </td>
            `;
            
            tbody.appendChild(row);
        });
        
    } catch (error) {
        console.error('Error loading active negotiations:', error);
    }
}

/**
 * Get status emoji
 */
function getStatusEmoji(status) {
    const emojis = {
        'INACTIVE': '⚪',
        'ACTIVE': '🟢',
        'NEGOTIATING': '🟡',
        'AGREED': '✅',
        'CLOSED': '⚫'
    };
    return emojis[status] || '⚪';
}

/**
 * Update pending count badge (in sidebar or header)
 */
function updatePendingCount(count) {
    const badge = document.getElementById('pendingCountBadge');
    if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'inline-block' : 'none';
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    loadPendingTransfers();
    loadActiveNegotiations();
    
    // Refresh every 30 seconds
    setInterval(() => {
        loadPendingTransfers();
        loadActiveNegotiations();
    }, 30000);
});
</script>
