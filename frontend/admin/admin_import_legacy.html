<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Legacy Records - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --p: #2e7d32; --pd: #1b5e20; }
    body { background: #f0f7f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(135deg, #000, #1b5e20); }
    .card { border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .upload-area { border: 4px dashed var(--p); background: #e8f5e9; border-radius: 20px; padding: 3rem; text-align: center; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="admin_dashboard.html">
      <i class="fas fa-arrow-left me-2"></i>Admin Dashboard
    </a>
  </div>
</nav>

<div class="container py-5">
  <div class="text-center mb-5">
    <h2 class="text-success"><i class="fas fa-upload fa-2x"></i> Import Legacy Records (UC017)</h2>
    <p class="lead text-muted">Bulk upload old paper-based records into blockchain</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-body p-5">
          <div class="upload-area mb-4">
            <i class="fas fa-file-csv fa-5x text-success mb-3"></i>
            <h4>Drop CSV/Excel File Here</h4>
            <input type="file" class="form-control form-control-lg mt-3" accept=".csv,.xlsx">
          </div>
          <div class="alert alert-info">
            <strong>Supported Format:</strong> PLRA Legacy Template (Khewat, Khatooni, Khasra, Owner CNIC, Mauza, etc.)
          </div>
          <div class="text-center">
            <button class="btn btn-success btn-lg px-5"><i class="fas fa-play"></i> Start Import (12,483 records)</button>
          </div>
          <div class="mt-4 p-4 bg-light rounded text-center">
            <h5>Last Import: <span class="text-success">18 Nov 2025</span></h5>
            <p>Success Rate: <strong class="text-success">98.7%</strong> • 41,203 records added</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
