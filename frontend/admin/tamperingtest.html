<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Tampering Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-detect { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-tamper { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-restore { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-compare { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            display: none;
            max-height: 500px;
            overflow-y: auto;
        }
        .result.show { display: block; }
        .result pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
        }
        .status {
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }
        .status.valid {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        .status.invalid {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #17a2b8;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.active { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .info-box ul {
            margin-left: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Blockchain Tampering Detector</h1>

        <div class="info-box">
            <strong>🎯 Quick Start:</strong>
            <ul>
                <li>Enter your admin token below</li>
                <li>Click "Detect Tampering" to check blockchain status</li>
                <li>Click "Simulate Tampering" to test detection</li>
                <li>Click "Restore Block" to fix any tampering</li>
            </ul>
        </div>

        <div class="section">
            <label>🔑 Admin Token (Required):</label>
            <input type="text" id="token" placeholder="Paste your admin token here..." />
            
            <label>📍 Block Index (for operations on specific block):</label>
            <input type="number" id="blockIndex" value="1" min="0" />
            
            <label>⚠️ Tampering Type:</label>
            <select id="tamperingType">
                <option value="MODIFY_DATA">MODIFY_DATA - Change transaction data</option>
                <option value="CHANGE_HASH">CHANGE_HASH - Modify blockchain hash</option>
                <option value="BREAK_CHAIN">BREAK_CHAIN - Break chain linkage</option>
                <option value="MODIFY_NONCE">MODIFY_NONCE - Change nonce value</option>
            </select>
        </div>

        <div class="button-grid">
            <button class="btn-detect" onclick="detectTampering()">🔍 Detect Tampering</button>
            <button class="btn-tamper" onclick="simulateTampering()">⚠️ Simulate Tampering</button>
            <button class="btn-restore" onclick="restoreBlock()">🔧 Restore Block</button>
            <button class="btn-compare" onclick="compareHashes()">🔎 Compare Hashes</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/blockchain';

        function getToken() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                alert('⚠️ Please enter your admin token first!');
                return null;
            }
            return token;
        }

        function getBlockIndex() {
            return parseInt(document.getElementById('blockIndex').value);
        }

        function getTamperingType() {
            return document.getElementById('tamperingType').value;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function showResult(data, type = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show';
            
            let statusHtml = '';
            if (data.isValid !== undefined) {
                statusHtml = `<div class="status ${data.isValid ? 'valid' : 'invalid'}">
                    ${data.isValid ? '✅ Blockchain is VALID' : '❌ Blockchain is COMPROMISED'}
                </div>`;
            }
            
            resultDiv.innerHTML = statusHtml + '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show';
            resultDiv.innerHTML = `<div class="status invalid">❌ Error: ${message}</div>`;
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const token = getToken();
            if (!token) return;

            try {
                showLoading(true);
                
                const options = {
                    method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                };

                if (body) {
                    options.body = JSON.stringify(body);
                }

                const response = await fetch(`${API_URL}${endpoint}`, options);
                const data = await response.json();

                showLoading(false);

                if (!response.ok) {
                    showError(data.message || 'Request failed');
                    return;
                }

                showResult(data);

            } catch (err) {
                showLoading(false);
                showError(err.message);
            }
        }

        async function detectTampering() {
            await apiCall('/tampering/detect');
        }

        async function simulateTampering() {
            const blockIndex = getBlockIndex();
            const tamperingType = getTamperingType();
            
            if (confirm(`⚠️ This will tamper with Block ${blockIndex}. Continue?`)) {
                await apiCall('/tampering/simulate', 'POST', { blockIndex, tamperingType });
            }
        }

        async function restoreBlock() {
            const blockIndex = getBlockIndex();
            
            if (confirm(`🔧 This will restore Block ${blockIndex}. Continue?`)) {
                await apiCall(`/tampering/restore/${blockIndex}`, 'POST');
            }
        }

        async function compareHashes() {
            const blockIndex = getBlockIndex();
            await apiCall(`/tampering/compare/${blockIndex}`);
        }

        // Auto-load token from localStorage if available
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('adminToken');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
            }
        });

        // Save token to localStorage when changed
        document.getElementById('token').addEventListener('change', (e) => {
            localStorage.setItem('adminToken', e.target.value);
        });

        // Show instructions on first load
        if (!localStorage.getItem('hasVisited')) {
            localStorage.setItem('hasVisited', 'true');
            alert('👋 Welcome! Please:\n\n1. Login to your admin account first\n2. Copy your token\n3. Paste it in the token field\n4. Click "Detect Tampering" to start');
        }
    </script>
</body>
</html>
