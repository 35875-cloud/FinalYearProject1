<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Approvals - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { 
      --primary: #667eea; 
      --primary-dark: #764ba2;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --info: #17a2b8;
    }
    
    body { 
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 0;
    }
    
    .page-header {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: all 0.3s;
      border-left: 5px solid;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    
    .stat-card.pending { border-left-color: var(--warning); }
    .stat-card.approved { border-left-color: var(--success); }
    .stat-card.rejected { border-left-color: var(--danger); }
    
    .stat-number {
      font-size: 3rem;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .stat-label {
      color: #666;
      font-size: 1rem;
      margin-top: 0.5rem;
      font-weight: 600;
    }
    
    .tabs-container {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .nav-tabs {
      border-bottom: 3px solid #e9ecef;
      margin-bottom: 2rem;
    }
    
    .nav-tabs .nav-link {
      border: none;
      color: #666;
      font-weight: 600;
      padding: 1rem 2rem;
      transition: all 0.3s;
      position: relative;
    }
    
    .nav-tabs .nav-link:hover {
      color: var(--primary);
      background: transparent;
    }
    
    .nav-tabs .nav-link.active {
      color: var(--primary);
      background: transparent;
      border: none;
    }
    
    .nav-tabs .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }
    
    .badge-count {
      background: var(--danger);
      color: white;
      border-radius: 20px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 0.5rem;
    }
    
    .user-card {
      background: white;
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 6px solid;
      transition: all 0.3s;
    }
    
    .user-card:hover {
      transform: translateX(5px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    
    .user-card.pending { border-left-color: var(--warning); }
    .user-card.approved { border-left-color: var(--success); }
    .user-card.rejected { border-left-color: var(--danger); }
    
    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .user-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-dark);
    }
    
    .role-badge {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-transform: uppercase;
    }
    
    .role-badge.lro {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    .role-badge.tehsildar {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
    }
    
    .role-badge.ac {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }
    
    .role-badge.dc {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
    }
    
    .user-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .detail-item {
      padding: 0.75rem;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
      border-radius: 10px;
    }
    
    .detail-label {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .detail-value {
      font-weight: 700;
      color: #1a1a1a;
      font-size: 0.95rem;
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .btn-approve {
      background: linear-gradient(135deg, var(--success), #38ef7d);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-approve:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
      color: white;
    }
    
    .btn-reject {
      background: linear-gradient(135deg, var(--danger), #d32f2f);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-reject:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
      color: white;
    }
    
    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-badge.pending {
      background: linear-gradient(135deg, #ffc107, #ff9800);
      color: white;
    }
    
    .status-badge.approved {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: white;
    }
    
    .status-badge.rejected {
      background: linear-gradient(135deg, #dc3545, #c82333);
      color: white;
    }
    
    .search-box {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .search-box input {
      padding: 0.75rem 1rem 0.75rem 3rem;
      border: 2px solid #e9ecef;
      border-radius: 15px;
      width: 100%;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      outline: none;
    }
    
    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6c757d;
    }
    
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    
    .approval-info, .rejection-reason {
      background: linear-gradient(135deg, rgba(40, 167, 69, 0.1), rgba(32, 201, 151, 0.1));
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
    }
    
    .rejection-reason {
      background: linear-gradient(135deg, rgba(220, 53, 69, 0.1), rgba(200, 35, 51, 0.1));
    }
    
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem;
    }
    
    .spinner-border {
      width: 3rem;
      height: 3rem;
      border-width: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="mb-2">
            <i class="fas fa-user-check me-2"></i>
            User Registration Approvals
          </h1>
          <p class="text-muted mb-0">Review and approve pending user registrations</p>
        </div>
        <button onclick="window.location.href='admin_dashboard.html'" class="btn btn-outline-primary">
          <i class="fas fa-arrow-left me-2"></i>
          Back to Dashboard
        </button>
      </div>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-row">
      <div class="stat-card pending">
        <h2 class="stat-number" id="pendingCount">0</h2>
        <p class="stat-label">Pending Approvals</p>
      </div>
      <div class="stat-card approved">
        <h2 class="stat-number" id="approvedCount">0</h2>
        <p class="stat-label">Approved Today</p>
      </div>
      <div class="stat-card rejected">
        <h2 class="stat-number" id="rejectedCount">0</h2>
        <p class="stat-label">Rejected Today</p>
      </div>
    </div>

    <!-- Tabs Container -->
    <div class="tabs-container">
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button">
            <i class="fas fa-clock me-2"></i>
            Pending
            <span class="badge-count" id="pendingBadge">0</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="approved-tab" data-bs-toggle="tab" data-bs-target="#approved" type="button">
            <i class="fas fa-check-circle me-2"></i>
            Approved
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="rejected-tab" data-bs-toggle="tab" data-bs-target="#rejected" type="button">
            <i class="fas fa-times-circle me-2"></i>
            Rejected
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- Pending Tab -->
        <div class="tab-pane fade show active" id="pending" role="tabpanel">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchPending" placeholder="Search by name, email, CNIC..." onkeyup="searchUsers('pending')">
          </div>
          <div id="pendingList"></div>
        </div>

        <!-- Approved Tab -->
        <div class="tab-pane fade" id="approved" role="tabpanel">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchApproved" placeholder="Search by name, email, CNIC..." onkeyup="searchUsers('approved')">
          </div>
          <div id="approvedList"></div>
        </div>

        <!-- Rejected Tab -->
        <div class="tab-pane fade" id="rejected" role="tabpanel">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchRejected" placeholder="Search by name, email, CNIC..." onkeyup="searchUsers('rejected')">
          </div>
          <div id="rejectedList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Rejection Modal -->
  <div class="modal fade" id="rejectUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 20px; border: none;">
        <div class="modal-header" style="background: linear-gradient(135deg, #dc3545, #c82333); color: white; border-radius: 20px 20px 0 0;">
          <h5 class="modal-title">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Reject User Registration
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="alert alert-warning">
            <i class="fas fa-info-circle me-2"></i>
            You are about to reject the following user:
          </div>
          <div class="mb-3">
            <strong>Name:</strong> <span id="rejectUserName"></span><br>
            <strong>Email:</strong> <span id="rejectUserEmail"></span>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Rejection Reason <span class="text-danger">*</span></label>
            <textarea class="form-control" id="rejectionReason" rows="4" placeholder="Please provide a clear reason for rejection..." required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" onclick="confirmRejectUser()">
            <i class="fas fa-times-circle me-2"></i>
            Confirm Rejection
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = "http://localhost:5000/api";
    const authToken = localStorage.getItem("authToken");
    let allUsers = { pending: [], approved: [], rejected: [] };
    let currentRejectUser = null;

    // Check authentication
    if (!authToken) {
      alert("⚠️ Please login first");
      window.location.href = "login.html";
    }

    // Load all data on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadAllData();
    });

    // Load all registration data
    async function loadAllData() {
      try {
        showLoading();

        const response = await fetch(`${API_URL}/auth/all-registrations`, {
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        });

        const result = await response.json();

        if (result.success) {
          allUsers.pending = result.pending || [];
          allUsers.approved = result.approved || [];
          allUsers.rejected = result.rejected || [];

          // Update statistics
          document.getElementById('pendingCount').textContent = allUsers.pending.length;
          document.getElementById('pendingBadge').textContent = allUsers.pending.length;
          document.getElementById('approvedCount').textContent = result.approvedToday || 0;
          document.getElementById('rejectedCount').textContent = result.rejectedToday || 0;

          // Render all lists
          renderUsers('pending');
          renderUsers('approved');
          renderUsers('rejected');
        } else {
          showAlert('danger', '❌ Error: ' + result.message);
        }

      } catch (err) {
        console.error('Error loading data:', err);
        showAlert('danger', 'Error loading registration data. Please try again.');
      }
    }

    // Show loading spinner
    function showLoading() {
      const lists = ['pendingList', 'approvedList', 'rejectedList'];
      lists.forEach(id => {
        document.getElementById(id).innerHTML = `
          <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        `;
      });
    }

    // Render users list
    function renderUsers(type) {
      const containerId = type + 'List';
      const container = document.getElementById(containerId);
      const users = allUsers[type];

      if (users.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <h4>No ${type.charAt(0).toUpperCase() + type.slice(1)} Users</h4>
            <p class="text-muted">There are currently no ${type} registrations to display.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = users.map(user => `
        <div class="user-card ${type}">
          <div class="user-header">
            <div>
              <div class="user-name">${user.name}</div>
              <small class="text-muted">
                <i class="fas fa-calendar me-1"></i>
                Registered: ${formatDate(user.created_at)}
              </small>
            </div>
            <div class="d-flex flex-column gap-2 align-items-end">
              ${getRoleBadge(user.role)}
              ${type === 'pending' ? `
                <span class="status-badge pending">
                  <i class="fas fa-clock"></i>
                  PENDING APPROVAL
                </span>
              ` : type === 'approved' ? `
                <span class="status-badge approved">
                  <i class="fas fa-check-circle"></i>
                  APPROVED
                </span>
              ` : `
                <span class="status-badge rejected">
                  <i class="fas fa-times-circle"></i>
                  REJECTED
                </span>
              `}
            </div>
          </div>

          <div class="user-details">
            <div class="detail-item">
              <div class="detail-label">
                <i class="fas fa-id-card"></i>
                CNIC
              </div>
              <div class="detail-value">${formatCNIC(user.cnic)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">
                <i class="fas fa-envelope"></i>
                Email
              </div>
              <div class="detail-value">${user.email}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">
                <i class="fas fa-phone"></i>
                Mobile
              </div>
              <div class="detail-value">${user.mobile}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">
                <i class="fas fa-fingerprint"></i>
                User ID
              </div>
              <div class="detail-value">${user.user_id}</div>
            </div>
          </div>

          ${type === 'approved' ? `
            <div class="approval-info">
              <strong><i class="fas fa-check-circle me-2"></i>Approved</strong>
              <div class="mt-2">
                <small>
                  <i class="fas fa-calendar me-1"></i>
                  ${formatDate(user.approved_at)}
                </small>
              </div>
            </div>
          ` : type === 'rejected' ? `
            <div class="rejection-reason">
              <strong><i class="fas fa-info-circle me-2"></i>Rejection Reason:</strong>
              <p class="mb-0 mt-2">${user.rejection_reason || 'No reason provided'}</p>
              <div class="mt-2">
                <small>
                  <i class="fas fa-calendar me-1"></i>
                  Rejected: ${formatDate(user.approved_at)}
                </small>
              </div>
            </div>
          ` : ''}

          ${type === 'pending' ? `
            <div class="action-buttons mt-3">
              <button class="btn-approve" onclick="approveUser('${user.user_id}', '${user.name}')">
                <i class="fas fa-check"></i>
                Approve Registration
              </button>
              <button class="btn-reject" onclick="openRejectModal('${user.user_id}', '${user.name}', '${user.email}')">
                <i class="fas fa-times"></i>
                Reject
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    // Get role badge
    function getRoleBadge(role) {
      const roleMap = {
        'LAND RECORD OFFICER': { class: 'lro', icon: 'fa-user-tie', text: 'Land Record Officer' },
        'TEHSILDAR': { class: 'tehsildar', icon: 'fa-user-tie', text: 'Tehsildar' },
        'AC': { class: 'ac', icon: 'fa-user-shield', text: 'Assistant Commissioner' },
        'DC': { class: 'dc', icon: 'fa-user-shield', text: 'Deputy Commissioner' }
      };

      const roleInfo = roleMap[role.toUpperCase()] || { class: 'lro', icon: 'fa-user', text: role };

      return `
        <span class="role-badge ${roleInfo.class}">
          <i class="fas ${roleInfo.icon}"></i>
          ${roleInfo.text}
        </span>
      `;
    }

    // Approve user
    async function approveUser(userId, userName) {
      if (!confirm(`Are you sure you want to approve ${userName}?\n\nThey will receive an email notification and can login immediately.`)) {
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/approve-user`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            userId,
            notes: `Approved by admin on ${new Date().toLocaleDateString()}`
          })
        });

        const result = await response.json();

        if (result.success) {
          showAlert('success', `✅ ${userName} approved successfully!`);
          loadAllData();
        } else {
          showAlert('danger', '❌ Error: ' + result.message);
        }

      } catch (err) {
        console.error('Error approving user:', err);
        showAlert('danger', 'Error approving user. Please try again.');
      }
    }

    // Open reject modal
    function openRejectModal(userId, userName, email) {
      currentRejectUser = { userId, userName, email };
      document.getElementById('rejectUserName').textContent = userName;
      document.getElementById('rejectUserEmail').textContent = email;
      document.getElementById('rejectionReason').value = '';
      new bootstrap.Modal(document.getElementById('rejectUserModal')).show();
    }

    // Confirm reject
    async function confirmRejectUser() {
      const reason = document.getElementById('rejectionReason').value.trim();
      
      if (!reason) {
        showAlert('warning', '⚠️ Please enter a rejection reason');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/reject-user`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            userId: currentRejectUser.userId,
            reason: reason
          })
        });

        const result = await response.json();

        if (result.success) {
          bootstrap.Modal.getInstance(document.getElementById('rejectUserModal')).hide();
          showAlert('warning', `✅ ${currentRejectUser.userName}'s registration rejected`);
          loadAllData();
        } else {
          showAlert('danger', '❌ Error: ' + result.message);
        }

      } catch (err) {
        console.error('Error rejecting user:', err);
        showAlert('danger', 'Error rejecting user. Please try again.');
      }
    }

    // Search users
    function searchUsers(type) {
      const searchValue = document.getElementById('search' + type.charAt(0).toUpperCase() + type.slice(1)).value.toLowerCase();
      
      if (!searchValue) {
        renderUsers(type);
        return;
      }

      const filtered = allUsers[type].filter(user => {
        return user.name.toLowerCase().includes(searchValue) ||
               user.email.toLowerCase().includes(searchValue) ||
               user.cnic.includes(searchValue.replace(/\D/g, '')) ||
               user.user_id.toLowerCase().includes(searchValue);
      });

      const containerId = type + 'List';
      const container = document.getElementById(containerId);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <h4>No Matching Users</h4>
            <p class="text-muted">No users found for your search criteria.</p>
          </div>
        `;
        return;
      }

      // Re-render with filtered results
      const tempUsers = { [type]: filtered };
      const originalUsers = allUsers;
      allUsers = tempUsers;
      renderUsers(type);
      allUsers = originalUsers;
    }

    // Format CNIC
    function formatCNIC(cnic) {
      if (!cnic || cnic.length !== 13) return cnic;
      return `${cnic.slice(0,5)}-${cnic.slice(5,12)}-${cnic.slice(12)}`;
    }

    // Format Date
    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-PK', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Show Alert
    function showAlert(type, message) {
      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
      alertDiv.style.cssText = `
        top: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 300px;
        max-width: 500px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      `;
      alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;
      document.body.appendChild(alertDiv);
      setTimeout(() => alertDiv.remove(), 5000);
    }
  </script>
</body>
</html>
