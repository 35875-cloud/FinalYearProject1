# ─────────────────────────────────────────────────────────────────
# Punjab Land Registry — Hyperledger Fabric Network
# 1 Org (PunjabLand), 1 Orderer, 1 Peer
# PoA: 5 LRO nodes will be added in next phase
# ─────────────────────────────────────────────────────────────────
version: '3.7'

networks:
  land_net:
    name: land_net

services:

  # ── Orderer ──────────────────────────────────────────────────────
  orderer.land.example.com:
    container_name: orderer.land.example.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/land.example.com/orderers/orderer.land.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/land.example.com/orderers/orderer.land.example.com/tls:/var/hyperledger/orderer/tls
      - orderer_data:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    networks: [land_net]

  # ── Peer 0 (PunjabLand) ──────────────────────────────────────────
  peer0.punjabland.example.com:
    container_name: peer0.punjabland.example.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=land_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.punjabland.example.com
      - CORE_PEER_ADDRESS=peer0.punjabland.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.punjabland.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.punjabland.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.punjabland.example.com:7051
      - CORE_PEER_LOCALMSPID=PunjabLandMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb:5984
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/punjabland.example.com/peers/peer0.punjabland.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/punjabland.example.com/peers/peer0.punjabland.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0_data:/var/hyperledger/production
    ports:
      - "7051:7051"
    depends_on: [orderer.land.example.com, couchdb]
    networks: [land_net]

  # ── CouchDB (rich query support) ──────────────────────────────────
  couchdb:
    container_name: couchdb
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    networks: [land_net]

  # ── Fabric CA ──────────────────────────────────────────────────────
  ca.punjabland.example.com:
    container_name: ca.punjabland.example.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.punjabland.example.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    volumes:
      - ca_data:/etc/hyperledger/fabric-ca-server
    ports:
      - "7054:7054"
    networks: [land_net]

volumes:
  orderer_data:
  peer0_data:
  couchdb_data:
  ca_data: