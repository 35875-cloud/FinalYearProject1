Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/land.example.com/msp
    Policies:
      Readers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
      Writers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
      Admins:  { Type: Signature, Rule: "OR('OrdererMSP.admin')"  }

  - &PunjabLand
    Name: PunjabLandMSP
    ID: PunjabLandMSP
    MSPDir: crypto-config/peerOrganizations/punjabland.example.com/msp
    Policies:
      Readers: { Type: Signature, Rule: "OR('PunjabLandMSP.admin', 'PunjabLandMSP.peer', 'PunjabLandMSP.client')" }
      Writers: { Type: Signature, Rule: "OR('PunjabLandMSP.admin', 'PunjabLandMSP.client')" }
      Admins:  { Type: Signature, Rule: "OR('PunjabLandMSP.admin')" }
      Endorsement: { Type: Signature, Rule: "OR('PunjabLandMSP.peer')" }
    AnchorPeers:
      - Host: peer0.punjabland.example.com
        Port: 7051

Capabilities:
  Channel:     { V2_0: true }
  Orderer:     { V2_0: true }
  Application: { V2_0: true }

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers"   }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers"   }
    Admins:  { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
    LifecycleEndorsement: { Type: ImplicitMeta, Rule: "MAJORITY Endorsement" }
    Endorsement:          { Type: ImplicitMeta, Rule: "MAJORITY Endorsement" }
  Capabilities:
    <<: *ApplicationDefaults

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses: [orderer.land.example.com:7050]
  EtcdRaft:
    Consenters:
      - Host: orderer.land.example.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/land.example.com/orderers/orderer.land.example.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/land.example.com/orderers/orderer.land.example.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount:   10
    AbsoluteMaxBytes:  99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers"      }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers"      }
    Admins:  { Type: ImplicitMeta, Rule: "MAJORITY Admins"  }
    BlockValidation: { Type: ImplicitMeta, Rule: "ANY Writers" }
  Capabilities:
    <<: *OrdererDefaults

Channel: &ChannelDefaults
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers"      }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers"      }
    Admins:  { Type: ImplicitMeta, Rule: "MAJORITY Admins"  }
  Capabilities:
    <<: *ChannelDefaults

Profiles:
  TwoOrgsApplicationGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations: [*OrdererOrg]
    Application:
      <<: *ApplicationDefaults
      Organizations: [*PunjabLand]